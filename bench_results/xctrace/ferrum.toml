[server]
host = "127.0.0.1"
port = 8000
config_path = "server.toml"
log_level = "info"
hot_reload = false

[models]
model_dir = "./models"
cache_dir = "./cache"

[models.aliases]

[models.download]
hf_cache_dir = "/Users/chejinxuan/.cache/huggingface"
timeout_seconds = 300
max_concurrent = 4
retry_attempts = 3

[benchmark]
num_requests = 100
concurrency = 10
prompt_length = 512
max_tokens = 256
warmup_requests = 10
output_dir = "./benchmark_results"

[client]
base_url = "http://127.0.0.1:8000"
timeout_seconds = 30

[client.retry]
max_attempts = 3
initial_delay_ms = 100
max_delay_ms = 5000
backoff_multiplier = 2.0

[dev]
debug = false
profile_memory = false
profile_gpu = false
mock_backends = false
test_data_dir = "./test_data"
