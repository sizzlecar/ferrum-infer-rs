name: Docker

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE: ${{ github.repository }}

jobs:
  # Matrix: one job per variant, both push to ghcr.io/<owner>/ferrum-infer-rs
  # with distinguishing tags (`:cpu-<ver>` / `:cuda-<ver>` / `:latest` for CUDA).
  build:
    strategy:
      fail-fast: false
      matrix:
        variant: [cpu, cuda]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tags
        id: tags
        run: |
          VARIANT="${{ matrix.variant }}"
          SHA="${GITHUB_SHA::7}"
          # Extract semver from tag (v0.7.0 → 0.7.0), or use branch/sha.
          if [[ "$GITHUB_REF" =~ ^refs/tags/v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            VER="${BASH_REMATCH[1]}"
          else
            VER="$SHA"
          fi

          IMG="${REGISTRY,,}/${IMAGE,,}"
          TAGS="${IMG}:${VARIANT}-${VER}"
          # `:latest` and `:cpu` / `:cuda` only on tagged releases
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAGS="${TAGS},${IMG}:${VARIANT}"
            # CUDA is the canonical "latest" since it auto-falls-back to CPU
            # on hosts without --gpus. CPU variant is smaller for non-GPU users.
            if [[ "$VARIANT" == "cuda" ]]; then
              TAGS="${TAGS},${IMG}:latest"
            fi
          fi
          {
            echo "tags=${TAGS}"
            echo "dockerfile=Dockerfile$([[ $VARIANT == cuda ]] && echo .cuda)"
          } >> "$GITHUB_OUTPUT"

      - name: Build + push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ steps.tags.outputs.dockerfile }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}
          platforms: linux/amd64
