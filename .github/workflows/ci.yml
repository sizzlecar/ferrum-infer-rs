name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  checks:
    name: Minimal Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config build-essential

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Compile (workspace, all targets)
        run: cargo check --workspace --all-targets

      - name: Clippy (advisory)
        run: cargo clippy --workspace --all-targets -- -A warnings
        continue-on-error: true

      - name: CLI E2E smoke tests
        run: |
          cargo build -p ferrum-cli --bin ferrum
          cargo test -p ferrum-cli --test cli_e2e

  cuda-check:
    name: CUDA Compile Check
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:12.6.0-devel-ubuntu22.04
    steps:
      - name: Install deps
        run: |
          apt-get update && apt-get install -y curl build-essential pkg-config libssl-dev git
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check CUDA compilation
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo check --workspace --features cuda

      - name: Build CUDA kernels (PTX)
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo build -p ferrum-cuda-kernels --features cuda
