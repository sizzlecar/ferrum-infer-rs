name: CI

on:
  # Only run on direct pushes to main (release commits, hotfixes).
  # PR branches already get covered by the pull_request trigger — running
  # both here doubles CI minutes for every PR commit.
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      build_ptx:
        description: 'Also compile CUDA kernels to PTX (~40min)'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  # Treat every rustc warning as an error. Keeps the tree clean — dev
  # opts into warnings locally for iteration and silences them via
  # `#[allow(...)]` on the specific item, never at the CI level.
  RUSTFLAGS: "-D warnings"

jobs:
  # ── CPU (Linux) ──────────────────────────────────────────────────────
  # Core quality gate: format, lint, unit tests, integration tests
  cpu:
    name: CPU (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ubuntu-latest ships with ~30 GB of preinstalled SDKs (.NET, Android,
      # Haskell, etc.) that we don't need. Cargo registry + target dir +
      # Rust toolchain easily blow past the remaining ~14 GB on big builds —
      # observed: jobs dying mid-cache-restore with "No space left on device".
      # Reclaim ~25 GB before any cache step touches the disk.
      - name: Free disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
            /usr/local/share/powershell /usr/share/swift
          sudo docker system prune -af --volumes 2>/dev/null || true
          df -h /

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config build-essential ffmpeg

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cpu-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cpu-

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Runtime env registry check
        run: |
          python3 -m py_compile scripts/check_ferrum_env_registry.py
          python3 scripts/check_ferrum_env_registry.py --self-test
          python3 scripts/check_ferrum_env_registry.py --fail-on-registry-gap \
            --max-direct-env-reads 75 \
            --max-process-env-writes 31 \
            --max-hot-direct-env-reads 4

      - name: CUDA build summary parser check
        run: |
          python3 -m py_compile scripts/validate_cuda_build_summary.py
          python3 scripts/validate_cuda_build_summary.py --self-test
          python3 -m py_compile scripts/m3_cuda_build_boundary_probe.py
          python3 scripts/m3_cuda_build_boundary_probe.py --self-test

      - name: Codebase shape check
        run: cargo test -q -p ferrum-types --test codebase_shape_test -- --nocapture

      - name: M3 runner artifact checks
        run: |
          python3 -m py_compile scripts/m3_ab_runner.py scripts/m3_validate_runner_artifact.py scripts/check_m3_runner_wrappers.py
          python3 scripts/m3_ab_runner.py --self-test
          python3 scripts/m3_validate_runner_artifact.py --self-test
          python3 scripts/check_m3_runner_wrappers.py --self-test
          python3 scripts/check_m3_runner_wrappers.py
          bash -n scripts/m3_fa2_direct_ffi_ab.sh
          bash -n scripts/m3_fa2_source_allcells_ab.sh
          bash -n scripts/m3_fa_layout_varlen_ab.sh
          bash -n scripts/m3_attn_v1_ab.sh
          bash -n scripts/m3_route_unified_profile.sh
          bash -n scripts/m3_graph_runtime_profile.sh
          bash -n scripts/m3_prefill_first_ab.sh
          bash -n scripts/m3_active_prefill_chunk_ab.sh
          bash -n scripts/m3_profile_sink_overhead_ab.sh
          MODEL_DIR="$(mktemp -d)"
          OUT_ROOT="$(mktemp -d)"
          MODEL_DIR="$MODEL_DIR" OUT_ROOT="$OUT_ROOT/fa-layout" BIN=/bin/echo \
            VALIDATE_ONLY=1 bash scripts/m3_fa_layout_varlen_ab.sh
          MODEL_DIR="$MODEL_DIR" OUT_ROOT="$OUT_ROOT/fa2-source" BIN=/bin/echo \
            FA2_SOURCE=1 VALIDATE_ONLY=1 bash scripts/m3_fa2_direct_ffi_ab.sh
          MODEL_DIR="$MODEL_DIR" OUT_ROOT="$OUT_ROOT/fa2-source-allcells" BIN=/bin/echo \
            FA2_SOURCE=1 VALIDATE_ONLY=1 bash scripts/m3_fa2_source_allcells_ab.sh
          MODEL_DIR="$MODEL_DIR" OUT_ROOT="$OUT_ROOT/attn-v1" BIN=/bin/echo \
            VALIDATE_ONLY=1 bash scripts/m3_attn_v1_ab.sh
          MODEL_DIR="$MODEL_DIR" OUT_ROOT="$OUT_ROOT/prefill-first" BIN=/bin/echo \
            VALIDATE_ONLY=1 bash scripts/m3_prefill_first_ab.sh
          MODEL_DIR="$MODEL_DIR" OUT_ROOT="$OUT_ROOT/active-prefill" BIN=/bin/echo \
            VALIDATE_ONLY=1 bash scripts/m3_active_prefill_chunk_ab.sh
          MODEL_DIR="$MODEL_DIR" OUT_ROOT="$OUT_ROOT/route-profile" BIN=/bin/echo \
            VALIDATE_ONLY=1 bash scripts/m3_route_unified_profile.sh
          MODEL_DIR="$MODEL_DIR" OUT_ROOT="$OUT_ROOT/graph-runtime" BIN=/bin/echo \
            VALIDATE_ONLY=1 bash scripts/m3_graph_runtime_profile.sh
          MODEL_DIR="$MODEL_DIR" OUT_ROOT="$OUT_ROOT/profile-sink" BIN=/bin/echo \
            VALIDATE_ONLY=1 bash scripts/m3_profile_sink_overhead_ab.sh

      - name: Compile (workspace, all targets)
        run: cargo check --workspace --all-targets

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -A warnings
        continue-on-error: true

      # ── Unit Tests ────────────────────────────────────
      - name: Unit tests (all crates)
        run: cargo test --workspace

      # ── Integration Tests ─────────────────────────────
      # These test subsystems without downloading models

      - name: "Test: Correctness (determinism, EOS, edge cases)"
        run: cargo test -p ferrum-engine --test correctness_test

      - name: "Test: Concurrency stress (32/64 concurrent)"
        run: cargo test -p ferrum-engine --test concurrency_stress_test

      - name: "Test: Audio processing (WAV, resample, mel)"
        run: cargo test -p ferrum-models --test audio_test

      - name: "Test: Type system (errors, configs, sampling)"
        run: cargo test -p ferrum-types

      - name: "Test: Interfaces (engine traits, sampler)"
        run: cargo test -p ferrum-interfaces

      - name: "Test: Scheduler (batch planning)"
        run: cargo test -p ferrum-scheduler

      - name: "Test: KV cache (paged lifecycle)"
        run: cargo test -p ferrum-kv

      - name: "Test: Sampler (top-k, top-p, temperature)"
        run: cargo test -p ferrum-sampler

      # ── CLI E2E ───────────────────────────────────────
      - name: "Test: CLI build + smoke test"
        run: |
          cargo build -p ferrum-cli --bin ferrum
          cargo test -p ferrum-cli --test cli_e2e
          # Verify help works
          ./target/debug/ferrum --help
          ./target/debug/ferrum tts --help
          ./target/debug/ferrum transcribe --help
          ./target/debug/ferrum serve --help

  # ── Metal (macOS) ────────────────────────────────────────────────────
  # Verifies Metal shader compilation + Metal-gated code paths
  metal:
    name: Metal (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-metal-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-metal-

      - name: Compile with Metal (all targets)
        run: cargo check --workspace --all-targets --features metal

      - name: Build CLI (Metal, release)
        run: cargo build --release -p ferrum-cli --features metal

      - name: Unit tests (with Metal feature)
        run: cargo test --workspace --features metal

      - name: "Test: Metal GEMM (vs cblas reference)"
        run: cargo test -p ferrum-attention --test gemm_test --features metal
        continue-on-error: true  # needs Metal GPU, may skip in CI VM

      - name: "Test: Metal flash attention"
        run: cargo test -p ferrum-attention --test metal_test --features metal
        continue-on-error: true

      - name: "Test: Metal transformer layer"
        run: cargo test -p ferrum-attention --test transformer_test --features metal
        continue-on-error: true

      - name: "Test: CLI help (Metal build)"
        run: |
          ./target/release/ferrum --help
          ./target/release/ferrum tts --help

  # ── CUDA (Linux + CUDA toolkit) ─────────────────────────────────────
  # Type-checks CUDA code paths. PTX build optional (slow).
  cuda:
    name: CUDA (Linux)
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:12.6.0-devel-ubuntu22.04
    steps:
      - name: Install deps
        run: |
          apt-get update
          apt-get install -y curl build-essential pkg-config libssl-dev git
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - uses: actions/checkout@v4

      - name: Type check (--features cuda)
        env:
          CUDA_COMPUTE_CAP: "80"
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo check --workspace --features cuda

      - name: Build CUDA kernels (PTX)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.build_ptx == 'true'
        env:
          CUDA_COMPUTE_CAP: "80"
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cargo build -p ferrum-kernels --features cuda
