name: Release CUDA Binary

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish, or label dry-run artifacts with. Optional when publish_release=false.'
        required: false
        default: ''
        type: string
      cuda_compute_cap:
        description: 'CUDA compute capability without dot; 89 targets RTX 4090/Ada.'
        required: true
        default: '89'
        type: string
      publish_release:
        description: 'Create/update the GitHub Release. Leave false for pre-release binary testing.'
        required: true
        default: false
        type: boolean

permissions:
  contents: write

defaults:
  run:
    shell: bash

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CUDA_HOME: /usr/local/cuda
  CUDA_ROOT: /usr/local/cuda

jobs:
  linux-x86_64-cuda:
    name: Linux x86_64 CUDA
    runs-on: ubuntu-22.04
    container:
      image: nvidia/cuda:12.6.0-devel-ubuntu22.04
    steps:
      - name: Validate manual release inputs
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish_release == 'true' && github.event.inputs.tag == ''
        run: |
          echo "tag is required when publish_release=true" >&2
          exit 1

      - name: Install system deps and Rust
        run: |
          apt-get update
          apt-get install -y --allow-change-held-packages ca-certificates curl build-essential pkg-config libssl-dev git file libnccl2 libnccl-dev
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --profile minimal --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Verify vendored FA2 source for fa2-source build
        run: |
          test -f crates/ferrum-kernels/kernels/fa2_source/flash_attn/src/flash.h
          test -f crates/ferrum-kernels/kernels/fa2_source/cutlass/include/cute/tensor.hpp
          test -f crates/ferrum-kernels/kernels/fa2_source/cutlass/include/cutlass/cutlass.h

      - name: Resolve version and CUDA target
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ github.event.inputs.tag }}"
            cuda_compute_cap="${{ github.event.inputs.cuda_compute_cap }}"
            if [[ -z "$tag" ]]; then
              tag="dry-run-${GITHUB_SHA::7}"
            fi
          else
            tag="${GITHUB_REF#refs/tags/}"
            cuda_compute_cap="89"
          fi
          cuda_compute_cap="${cuda_compute_cap//./}"
          if ! [[ "$cuda_compute_cap" =~ ^[0-9]+$ ]]; then
            echo "invalid cuda_compute_cap: $cuda_compute_cap" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "cuda_compute_cap=$cuda_compute_cap" >> "$GITHUB_OUTPUT"
          echo "asset=ferrum-linux-x86_64-cuda-sm${cuda_compute_cap}" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-linux-x86_64-cuda-sm${{ steps.version.outputs.cuda_compute_cap }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            release-linux-x86_64-cuda-sm${{ steps.version.outputs.cuda_compute_cap }}-
            release-linux-x86_64-cuda-

      - name: Build (release, CUDA)
        env:
          CUDA_COMPUTE_CAP: ${{ steps.version.outputs.cuda_compute_cap }}
        run: |
          export PATH="$HOME/.cargo/bin:/usr/local/cuda/bin:$PATH"
          export LD_LIBRARY_PATH="/usr/local/cuda/lib64:${LD_LIBRARY_PATH:-}"
          cargo build --release -p ferrum-cli --bin ferrum \
            --features cuda,vllm-moe-marlin,vllm-paged-attn-v2,fa2-source

      - name: Strip binary
        run: strip target/release/ferrum

      - name: Dependency audit
        run: |
          ldd target/release/ferrum | tee "${{ steps.version.outputs.asset }}.ldd.txt"
          if grep -Ei 'torch|python|vllm' "${{ steps.version.outputs.asset }}.ldd.txt"; then
            echo "CUDA release binary must not link Torch/Python/vLLM" >&2
            exit 1
          fi

      - name: Package tarball
        run: |
          asset="${{ steps.version.outputs.asset }}"
          mkdir -p dist
          cp target/release/ferrum dist/ferrum
          cp LICENSE dist/LICENSE
          cp README.md dist/README.md
          cat > dist/CUDA-BUILD.txt <<EOF
          Ferrum CUDA release binary

          Tag: ${{ steps.version.outputs.tag }}
          CUDA toolkit image: nvidia/cuda:12.6.0-devel-ubuntu22.04
          CUDA_COMPUTE_CAP: ${{ steps.version.outputs.cuda_compute_cap }}
          Cargo features: cuda,vllm-moe-marlin,vllm-paged-attn-v2,fa2-source

          This package does not bundle NVIDIA driver/runtime libraries.
          Install a compatible NVIDIA driver, CUDA runtime, and NCCL runtime on the target host.
          EOF
          tar -C dist -czf "${asset}.tar.gz" ferrum LICENSE README.md CUDA-BUILD.txt
          ls -lh "${asset}.tar.gz"
          sha256sum "${asset}.tar.gz" | tee "${asset}.tar.gz.sha256"

      - name: Smoke test the packaged binary
        run: |
          asset="${{ steps.version.outputs.asset }}"
          mkdir -p smoke
          tar -C smoke -xzf "${asset}.tar.gz"
          if ldconfig -p 2>/dev/null | grep -q 'libcuda.so.1'; then
            LD_LIBRARY_PATH="/usr/local/cuda/lib64:${LD_LIBRARY_PATH:-}" ./smoke/ferrum --help | head -5
          else
            echo "libcuda.so.1 is not available in the GitHub Actions container; deferring executable smoke to the GPU release gate."
            ldd ./smoke/ferrum
          fi

      - name: Upload dry-run artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.asset }}-${{ steps.version.outputs.tag }}
          path: |
            ${{ steps.version.outputs.asset }}.tar.gz
            ${{ steps.version.outputs.asset }}.tar.gz.sha256
            ${{ steps.version.outputs.asset }}.ldd.txt

      - uses: softprops/action-gh-release@v2
        if: github.event_name == 'push' || github.event.inputs.publish_release == 'true'
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            ${{ steps.version.outputs.asset }}.tar.gz
            ${{ steps.version.outputs.asset }}.tar.gz.sha256
            ${{ steps.version.outputs.asset }}.ldd.txt
